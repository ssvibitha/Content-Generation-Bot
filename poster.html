<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Poster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }
        
        .poster {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #1e3a8a 0%, #312e81 50%, #1e1b4b 100%);
            border-radius: 0;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        
        .poster::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 80%;
            height: 150%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .poster::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 70%;
            height: 120%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .badge {
            background: rgba(139, 92, 246, 0.25);
            color: #c4b5fd;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            display: inline-block;
            border: 1.5px solid rgba(139, 92, 246, 0.4);
            z-index: 1;
            align-self: flex-start;
            backdrop-filter: blur(10px);
        }
        
        .main-content {
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        h1 {
            font-size: 68px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 24px;
            line-height: 1.1;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        
        .highlight {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        h2 {
            font-size: 28px;
            font-weight: 400;
            color: #cbd5e1;
            margin-bottom: 50px;
            line-height: 1.4;
        }
        
        .features {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            padding: 14px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        }
        
        .icon {
            font-size: 28px;
        }
        
        .feature-text {
            color: #e2e8f0;
            font-size: 17px;
            font-weight: 600;
        }
        
        .tech-stack {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .tech {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
            margin-top: 20px;
        }
        
        .author {
            color: #94a3b8;
            font-size: 16px;
            font-weight: 500;
        }
        
        .cta {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
            letter-spacing: 0.5px;
        }
        
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="grid"></div>
        
        <!-- <div class="badge">📘 Tutorial</div> -->
        
        <div class="main-content">
            <h1>
                Building an AI Chatbot<br>
                with <span class="highlight">Azure OpenAI</span>
            </h1>
            
            <h2>Function calling, file operations, and intelligent tool usage with GPT-4</h2>
            
            <div class="features">
                <div class="feature">
                    <div class="icon">🤖</div>
                    <div class="feature-text">GPT-4 Powered</div>
                </div>
                <div class="feature">
                    <div class="icon">🛠️</div>
                    <div class="feature-text">10+ Tools</div>
                </div>
                <div class="feature">
                    <div class="icon">🎨</div>
                    <div class="feature-text">Modern UI</div>
                </div>
            </div>
            
            <div class="tech-stack">
                <div class="tech">Python</div>
                <div class="tech">Azure OpenAI</div>
                <div class="tech">Gradio</div>
                <div class="tech">Function Calling</div>
            </div>
        </div>
        
        <div class="footer">
            <div class="author">A complete guide with source code</div>
            <!-- <div class="cta">Read on Medium →</div> -->
        </div>
    </div>
</body>
</html>
